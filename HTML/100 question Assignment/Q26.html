<!DOCTYPE html>

<head>

    <title>Q26 - Explain br Tag</title>
</head>

<body>

    <h1>Question 26</h1>

    <h2>What is the &lt;br&gt; Tag?</h2>

    <p>
        The <strong>&lt;br&gt;</strong> (Break) tag is used to insert a single line break
        in HTML. It is an empty element and does not require a closing tag.
    </p>

    <h3>Example</h3>

    <pre>
Hello&lt;br&gt;
World
    </pre>

    <h3>Output</h3>

    <p>
        Hello<br>
        World
    </p>

</body>

</html>
