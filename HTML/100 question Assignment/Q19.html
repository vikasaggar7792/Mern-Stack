<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q19 - Difference Between Class and ID</title>
</head>

<body>

    <h1>Question 19</h1>

    <h2>Difference Between Class and ID</h2>

    <table border="1" cellpadding="8">

        <tr>
            <th>Class</th>
            <th>ID</th>
        </tr>

        <tr>
            <td>Can be used on multiple elements.</td>
            <td>Must be unique on a page.</td>
        </tr>

        <tr>
            <td>Written using class=""</td>
            <td>Written using id=""</td>
        </tr>

        <tr>
            <td>Selected in CSS using .classname</td>
            <td>Selected in CSS using #idname</td>
        </tr>

        <tr>
            <td>Reusable.</td>
            <td>Not reusable on the same page.</td>
        </tr>

    </table>

</body>

</html>
