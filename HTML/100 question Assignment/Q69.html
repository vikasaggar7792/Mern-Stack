<body>

    <h1>Question 69</h1>

    <h2>Which Video Formats are Supported by HTML5?</h2>

    <p>
        The HTML5 <strong>&lt;video&gt;</strong> element supports the following
        common video formats:
    </p>

    <table border="1" cellpadding="8">

        <tr>
            <th>Format</th>
            <th>Extension</th>
        </tr>

        <tr>
            <td>MPEG-4</td>
            <td>.mp4</td>
        </tr>

        <tr>
            <td>WebM</td>
            <td>.webm</td>
        </tr>

        <tr>
            <td>Ogg</td>
            <td>.ogv</td>
        </tr>

    </table>

</body>
