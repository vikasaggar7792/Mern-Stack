<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q35 - Radio Button and Checkbox</title>
</head>

<body>

    <h1>Question 35</h1>

    <h2>Create Radio Buttons and Checkboxes. Explain the Difference.</h2>

    <h3>Course (Radio Buttons)</h3>

    <input type="radio" id="mern" name="course">
    <label for="mern">MERN</label>

    <input type="radio" id="mean" name="course">
    <label for="mean">MEAN</label>

    <br><br>

    <h3>Technology (Checkboxes)</h3>

    <input type="checkbox" id="html">
    <label for="html">HTML</label><br>

    <input type="checkbox" id="css">
    <label for="css">CSS</label><br>

    <input type="checkbox" id="react">
    <label for="react">React</label><br>

    <input type="checkbox" id="node">
    <label for="node">Node.js</label>

    <hr>

    <h3>Difference</h3>

    <ul>
        <li><strong>Radio Button:</strong> Allows selecting only one option from a group.</li>
        <li><strong>Checkbox:</strong> Allows selecting multiple options.</li>
    </ul>

</body>

</html>
