<body>

    <h1>Question 1</h1>

    <h2>How Will You Start an Ordered List from 10?</h2>

    <p>
        The <code>start</code> attribute of the <code>&lt;ol&gt;</code> tag is
        used to specify the starting number of an ordered list.
    </p>

    <h3>Example</h3>

    <pre>
&lt;ol start="10"&gt;
    &lt;li&gt;Aayush Kumar&lt;/li&gt;
    &lt;li&gt;Rajnikant&lt;/li&gt;
    &lt;li&gt;Ironman&lt;/li&gt;
&lt;/ol&gt;
    </pre>

</body>

</html>
