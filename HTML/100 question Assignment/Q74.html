    <h1>Question 74</h1>

    <h2>What is the Geolocation API in HTML5?</h2>

    <p>
        The HTML5 <strong>Geolocation API</strong> allows websites to access the
        user's geographical location after obtaining permission.
    </p>

    <h3>Common Uses</h3>

    <ul>
        <li>Navigation applications</li>
        <li>Location-based services</li>
        <li>Maps and tracking</li>
        <li>Nearby store or restaurant search</li>
    </ul>
