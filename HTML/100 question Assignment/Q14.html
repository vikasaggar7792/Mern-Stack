    <h1>Question 14</h1>

    <h2>What is Localhost?</h2>

    <p>
        Localhost refers to the current computer being used. Developers use it to
        test websites and web applications before deploying them to a live server.
    </p>

    <h3>Default Localhost Address</h3>

    <p><strong>127.0.0.1</strong></p>

    <h3>Example</h3>

    <pre>
http://localhost/project/
    </pre>
