<!DOCTYPE html>

<head>

    <title>Q43 - dl, dt and dd</title>
</head>

<body>

    <h1>Question 43</h1>

    <h2>What do &lt;dl&gt;, &lt;dt&gt; and &lt;dd&gt; Mean?</h2>

    <table border="1" cellpadding="8">

        <tr>
            <th>Tag</th>
            <th>Meaning</th>
        </tr>

        <tr>
            <td>&lt;dl&gt;</td>
            <td>Definition List - Creates the list.</td>
        </tr>

        <tr>
            <td>&lt;dt&gt;</td>
            <td>Definition Term - Specifies the term.</td>
        </tr>

        <tr>
            <td>&lt;dd&gt;</td>
            <td>Definition Description - Describes the term.</td>
        </tr>

    </table>

</body>
