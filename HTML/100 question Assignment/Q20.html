    <h1>Question 20</h1>

    <h2>What are Self Closing Tags?</h2>

    <p>
        Self-closing tags are HTML tags that do not require a separate closing tag.
        They contain no content between opening and closing tags.
    </p>

    <h3>Examples</h3>

    <ul>
        <li>&lt;br&gt;</li>
        <li>&lt;hr&gt;</li>
        <li>&lt;img&gt;</li>
        <li>&lt;input&gt;</li>
        <li>&lt;meta&gt;</li>
        <li>&lt;link&gt;</li>
    </ul>

</body>
