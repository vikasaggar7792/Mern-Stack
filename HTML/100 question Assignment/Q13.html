    <h1>Question 13</h1>

    <h2>What is an IP Address?</h2>

    <p>
        An IP (Internet Protocol) Address is a unique numerical identifier assigned
        to every device connected to a network. It allows devices to communicate
        over the internet.
    </p>

    <h3>Types of IP Address</h3>

    <ul>
        <li>IPv4 (Example: 192.168.1.1)</li>
        <li>IPv6 (Example: 2001:db8::1)</li>
    </ul>
