    <h1>Question 42</h1>

    <h2>Write the Structure of a Definition List</h2>

    <p>A definition list is created using the <strong>&lt;dl&gt;</strong> tag.</p>

    <h3>Syntax</h3>

    <pre>
&lt;dl&gt;
    &lt;dt&gt;HTML&lt;/dt&gt;
    &lt;dd&gt;HyperText Markup Language&lt;/dd&gt;

    &lt;dt&gt;CSS&lt;/dt&gt;
    &lt;dd&gt;Cascading Style Sheets&lt;/dd&gt;
&lt;/dl&gt;
    </pre>
