    <title>Q2 - Upload an Image</title>
</head>

<body>

    <h1>Question 2</h1>

    <h2>What Input Type Will You Use to Upload an Image?</h2>

    <p>
        To upload an image (or any file), use the
        <code>&lt;input type="file"&gt;</code> element.
    </p>

    <h3>Example</h3>

    <pre>
&lt;form&gt;
    &lt;input type="file" accept="image/*"&gt;
&lt;/form&gt;
    </pre>

    <p>
        The <code>accept="image/*"</code> attribute restricts file selection to
        image files only.
    </p>

</body>

</html>
