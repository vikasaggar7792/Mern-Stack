<body>

    <h1>Question 51</h1>

    <h2>Does a Hyperlink Only Apply to Text?</h2>

    <p>
        <strong>No.</strong> A hyperlink is not limited to text. It can also be
        applied to images, buttons, icons, or any HTML element using the
        <strong>&lt;a&gt;</strong> tag.
    </p>

    <h3>Example</h3>

    <pre>
&lt;a href="https://www.google.com"&gt;
    &lt;img src="logo.png" alt="Google Logo"&gt;
&lt;/a&gt;
    </pre>

</body>

</html>
