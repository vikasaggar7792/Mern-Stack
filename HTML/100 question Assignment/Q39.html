<body>

    <h1>Question 39</h1>

    <h2>Which HTML Tag is Used to Display Data in Tabular Form?</h2>

    <p>
        The <strong>&lt;table&gt;</strong> tag is used to display data in rows and columns.
    </p>

    <h3>Example</h3>

    <pre>
&lt;table border="1"&gt;
    &lt;tr&gt;
        &lt;th&gt;Name&lt;/th&gt;
        &lt;th&gt;Age&lt;/th&gt;
    &lt;/tr&gt;

    &lt;tr&gt;
        &lt;td&gt;Aayush&lt;/td&gt;
        &lt;td&gt;22&lt;/td&gt;
    &lt;/tr&gt;
&lt;/table&gt;
    </pre>

</body>

</html>
