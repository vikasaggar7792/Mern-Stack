    <h1>Question 9</h1>

    <h2>How Will You Open Another Window Using an Anchor Tag?</h2>

    <p>
        Use the <code>target="_blank"</code> attribute in the
        <code>&lt;a&gt;</code> tag to open the linked webpage in a new browser tab
        or window.
    </p>

    <h3>Example</h3>

    <pre>
&lt;a href="https://www.google.com"
   target="_blank"&gt;
   Open Google
&lt;/a&gt;
    </pre>

</body>
