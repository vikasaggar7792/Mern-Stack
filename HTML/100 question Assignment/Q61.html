    <h1>Question 61</h1>

    <h2>What is the Use of the &lt;iframe&gt; Tag?</h2>

    <p>
        The <strong>&lt;iframe&gt;</strong> (Inline Frame) tag is used to embed another
        HTML document, webpage, video, map, or PDF inside the current webpage.
    </p>

    <h3>Example</h3>

    <pre>
&lt;iframe src="https://example.com"
        width="500"
        height="300"&gt;
&lt;/iframe&gt;
    </pre>

</body>
