<!DOCTYPE html>
<html lang="en">

<head>

    <title>Q60 - Use of Span Tag</title>
</head>

<body>

    <h1>Question 60</h1>

    <h2>What is the Use of the &lt;span&gt; Tag? Give One Example.</h2>

    <p>
        The <strong>&lt;span&gt;</strong> tag is an inline element used to style or
        group a small portion of text without affecting the layout.
    </p>

    <h3>Example</h3>

    <pre>
&lt;p&gt;
    My favorite color is
    &lt;span style="color:red;"&gt;Red&lt;/span&gt;.
&lt;/p&gt;
    </pre>

    <h3>Output</h3>

    <p>
        My favorite color is
        <span style="color:red;">Red</span>.
    </p>

</body>

</html>
