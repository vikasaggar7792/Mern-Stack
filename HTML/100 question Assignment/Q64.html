<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q64 - DOCTYPE Declaration</title>
</head>

<body>

    <h1>Question 64</h1>

    <h2>Is &lt;!DOCTYPE html&gt; an HTML Tag?</h2>

    <p>
        <strong>No.</strong> <code>&lt;!DOCTYPE html&gt;</code> is not an HTML tag.
        It is a declaration that tells the browser the document is written in
        HTML5 and should be rendered in standards mode.
    </p>

    <h3>Example</h3>

    <pre>
&lt;!DOCTYPE html&gt;
&lt;html&gt;
    ...
&lt;/html&gt;
    </pre>

</body>

</html>
