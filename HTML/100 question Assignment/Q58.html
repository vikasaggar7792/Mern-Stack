<body>

    <h1>Question 58</h1>

    <h2>How Many Tags Can Be Used to Separate a Section of Text?</h2>

    <p>
        The most commonly used tags for separating sections of text are:
    </p>

    <ul>
        <li><strong>&lt;br&gt;</strong> - Inserts a line break.</li>
        <li><strong>&lt;hr&gt;</strong> - Inserts a horizontal line to separate content.</li>
    </ul>

    <h3>Example</h3>

    <pre>
Hello&lt;br&gt;World

&lt;hr&gt;
    </pre>

    <h3>Output</h3>

    <p>
        Hello<br>
        World
    </p>

    <hr>

</body>
