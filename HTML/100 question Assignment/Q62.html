<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q62 - HTML Entities</title>
</head>

<body>

    <h1>Question 62</h1>

    <h2>What are Entities in HTML?</h2>

    <p>
        HTML entities are special character codes used to display reserved
        characters or symbols that cannot be typed directly in HTML.
    </p>

    <h3>Common HTML Entities</h3>

    <table border="1" cellpadding="8">

        <tr>
            <th>Entity</th>
            <th>Output</th>
        </tr>

        <tr>
            <td>&amp;lt;</td>
            <td>&lt;</td>
        </tr>

        <tr>
            <td>&amp;gt;</td>
            <td>&gt;</td>
        </tr>

        <tr>
            <td>&amp;amp;</td>
            <td>&amp;</td>
        </tr>

        <tr>
            <td>&amp;copy;</td>
            <td>&copy;</td>
        </tr>

        <tr>
            <td>&amp;nbsp;</td>
            <td>Non-breaking Space</td>
        </tr>

    </table>

</body>

</html>
