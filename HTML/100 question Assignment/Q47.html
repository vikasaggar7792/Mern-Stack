    <h1>Question 47</h1>

    <h2>How to Insert a Copyright Symbol on a Web Page?</h2>

    <p>
        The copyright symbol can be inserted using the HTML entity
        <strong>&amp;copy;</strong> or <strong>&amp;#169;</strong>.
    </p>

    <h3>Example</h3>

    <pre>
&lt;p&gt;&amp;copy; 2026 My Website&lt;/p&gt;
    </pre>

    <h3>Output</h3>

    <p>&copy; 2026 My Website</p>

</body>
