    <h2>How Many Types of Headings Does HTML Contain?</h2>

    <p>
        HTML provides <strong>6 heading tags</strong>.
    </p>

    <ul>
        <li>&lt;h1&gt;</li>
        <li>&lt;h2&gt;</li>
        <li>&lt;h3&gt;</li>
        <li>&lt;h4&gt;</li>
        <li>&lt;h5&gt;</li>
        <li>&lt;h6&gt;</li>
    </ul>
