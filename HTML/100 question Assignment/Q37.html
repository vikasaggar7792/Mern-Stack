<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q37 - Highest and Lowest Priority Heading</title>
</head>

<body>

    <h1>Question 37</h1>

    <h2>Which Heading Has the Highest and Least Priority?</h2>

    <table border="1" cellpadding="8">

        <tr>
            <th>Heading Tag</th>
            <th>Priority</th>
        </tr>

        <tr>
            <td>&lt;h1&gt;</td>
            <td>Highest Priority</td>
        </tr>

        <tr>
            <td>&lt;h6&gt;</td>
            <td>Lowest Priority</td>
        </tr>

    </table>

    <p>
        <strong>&lt;h1&gt;</strong> is used for the main title of the page,
        while <strong>&lt;h6&gt;</strong> is used for the least important heading.
    </p>

</body>

</html>
