<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q34 - Colspan in Table</title>
</head>

<body>

    <h1>Question 34</h1>

    <h2>Create a Table and Explain Colspan</h2>

    <p>
        The <strong>colspan</strong> attribute is used to make a table cell span
        across two or more columns.
    </p>

    <table border="1" cellpadding="8">

        <tr>
            <th colspan="2">Employee Details</th>
        </tr>

        <tr>
            <th>Name</th>
            <th>Salary</th>
        </tr>

        <tr>
            <td>Aayush</td>
            <td>₹50,000</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>₹60,000</td>
        </tr>

    </table>

</body>

</html>
