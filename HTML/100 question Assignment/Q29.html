<!DOCTYPE html>

    <title>Q29 - Unordered List with Circle</title>

<body>

    <h1>Question 29</h1>

    <h2>Write HTML Code to Create an Unordered List with Circle Bullets</h2>

    <h3>Code</h3>

    <pre>
&lt;ul type="circle"&gt;
    &lt;li&gt;HTML&lt;/li&gt;
    &lt;li&gt;CSS&lt;/li&gt;
    &lt;li&gt;JavaScript&lt;/li&gt;
&lt;/ul&gt;
    </pre>

    <h3>Output</h3>

    <ul type="circle">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

</body>

</html>
