<body>

    <h1>Question 38</h1>

    <h2>How to Create a Hyperlink in HTML?</h2>

    <p>
        A hyperlink is created using the <strong>&lt;a&gt;</strong> (anchor) tag.
    </p>

    <h3>Example</h3>

    <pre>
&lt;a href="https://www.google.com"&gt;Visit Google&lt;/a&gt;
    </pre>

    <h3>Output</h3>

    <a href="https://www.google.com" target="_blank" rel="noopener noreferrer">
        Visit Google
    </a>

</body>
