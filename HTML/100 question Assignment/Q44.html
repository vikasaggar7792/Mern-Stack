<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q44 - HTML Elements vs HTML Tags</title>
</head>

<body>

    <h1>Question 44</h1>

    <h2>What is the Difference Between HTML Elements and HTML Tags?</h2>

    <table border="1" cellpadding="8">

        <tr>
            <th>HTML Tags</th>
            <th>HTML Elements</th>
        </tr>

        <tr>
            <td>Enclosed inside &lt; &gt; brackets.</td>
            <td>Consists of opening tag, content and closing tag.</td>
        </tr>

        <tr>
            <td>Example: &lt;p&gt;</td>
            <td>Example: &lt;p&gt;Hello&lt;/p&gt;</td>
        </tr>

        <tr>
            <td>Defines the beginning or end.</td>
            <td>Represents the complete HTML component.</td>
        </tr>

    </table>

</body>

</html>
