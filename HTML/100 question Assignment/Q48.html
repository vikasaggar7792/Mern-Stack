    <h1>Question 48</h1>

    <h2>How to Create a Nested Webpage in HTML?</h2>

    <p>
        A nested webpage can be created using the
        <strong>&lt;iframe&gt;</strong> tag, which displays another HTML page
        inside the current webpage.
    </p>

    <h3>Example</h3>

    <pre>
&lt;iframe src="page2.html"
        width="500"
        height="300"&gt;
&lt;/iframe&gt;
    </pre>

</body>
