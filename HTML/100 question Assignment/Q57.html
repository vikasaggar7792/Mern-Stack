<body>

    <h1>Question 57</h1>

    <h2>How to Make a Picture the Background of a Web Page?</h2>

    <p>
        A background image can be added using the CSS
        <strong>background-image</strong> property.
    </p>

    <h3>Example</h3>

    <pre>
&lt;style&gt;
body{
    background-image:url("background.jpg");
    background-size:cover;
}
&lt;/style&gt;
    </pre>

</body>
