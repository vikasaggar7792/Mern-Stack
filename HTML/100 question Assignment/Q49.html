    <h1>Question 49</h1>

    <h2>What is the Use of the &lt;iframe&gt; Tag? How to Create It?</h2>

    <p>
        The <strong>&lt;iframe&gt;</strong> tag is used to embed another webpage,
        video, map, or document inside the current webpage.
    </p>

    <h3>Syntax</h3>

    <pre>
&lt;iframe src="page.html"
        width="600"
        height="400"&gt;
&lt;/iframe&gt;
    </pre>

    <h3>Example</h3>

    <iframe src="https://example.com" width="400" height="200">
    </iframe>

</body>
