<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q63 - URL Encoding</title>
</head>

<body>

    <h1>Question 63</h1>

    <h2>Why is a URL Encoded in HTML?</h2>

    <p>
        URL encoding converts special characters and spaces into a format that
        can be safely transmitted over the internet.
    </p>

    <h3>Example</h3>

    <table border="1" cellpadding="8">

        <tr>
            <th>Original URL</th>
            <th>Encoded URL</th>
        </tr>

        <tr>
            <td>My File.html</td>
            <td>My%20File.html</td>
        </tr>

    </table>

    <p>
        Here, <strong>%20</strong> represents a space.
    </p>

</body>

</html>
