    <h1>Question 27</h1>

    <h2>What are Semantic Tags?</h2>

    <p>
        Semantic tags clearly describe the meaning and purpose of the content they
        contain. They improve readability, accessibility, and SEO.
    </p>

    <h3>Examples</h3>

    <ul>
        <li>&lt;header&gt;</li>
        <li>&lt;nav&gt;</li>
        <li>&lt;main&gt;</li>
        <li>&lt;section&gt;</li>
        <li>&lt;article&gt;</li>
        <li>&lt;aside&gt;</li>
        <li>&lt;footer&gt;</li>
    </ul>

</body>
