    <h1>Question 52</h1>

    <h2>What is a Style Sheet?</h2>

    <p>
        A <strong>Style Sheet</strong> is a file or set of rules used to control
        the appearance of HTML elements. CSS (Cascading Style Sheets) is used to
        define colors, fonts, spacing, layouts, and other visual styles.
    </p>

    <h3>Example</h3>

    <pre>
p {
    color: blue;
    font-size: 20px;
}
    </pre>

</body>
