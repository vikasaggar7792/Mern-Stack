<body>

    <h1>Question 59</h1>

    <h2>What are Empty Elements?</h2>

    <p>
        Empty elements are HTML elements that do not contain any content and do
        not require a closing tag.
    </p>

    <h3>Examples</h3>

    <ul>
        <li>&lt;br&gt;</li>
        <li>&lt;hr&gt;</li>
        <li>&lt;img&gt;</li>
        <li>&lt;input&gt;</li>
        <li>&lt;meta&gt;</li>
        <li>&lt;link&gt;</li>
    </ul>

</body>
