    <h1>Question 54</h1>

    <h2>Is it Possible to Change the Color of the Bullet?</h2>

    <p>
        <strong>Yes.</strong> The bullet color can be changed using CSS with the
        <strong>::marker</strong> pseudo-element.
    </p>

    <h3>Example</h3>

    <pre>
&lt;style&gt;
li::marker {
    color: red;
}
&lt;/style&gt;
    </pre>

    <style>
        li::marker {
            color: red;
        }
    </style>

    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

</body>
