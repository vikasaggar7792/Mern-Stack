    <h1>Question 77</h1>

    <h2>What is Application Cache in HTML5?</h2>

    <p>
        <strong>Application Cache (AppCache)</strong> was a feature that allowed
        web applications to work offline by storing web resources locally.
    </p>

    <p>
        <strong>Note:</strong> AppCache has been <strong>deprecated</strong> and
        replaced by <strong>Service Workers</strong> in modern web development.
    </p>
